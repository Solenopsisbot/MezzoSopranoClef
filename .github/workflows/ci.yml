name: CI

# Build + test on every push and pull request. The separate Live E2E workflow runs heavier
# real-server verification on demand and on a schedule.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Check whitespace
        run: git diff --check

      # `./gradlew build` compiles the mod + launcher, runs the JUnit suites, and
      # remaps the jar (Fabric/Loom) into build/libs.
      - name: Build (compile, JUnit tests, remap jar, launcher jar)
        run: ./gradlew build --stacktrace --no-daemon

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            build/libs/*.jar
            launcher/build/libs/*.jar

  typescript-client:
    name: TypeScript client tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
