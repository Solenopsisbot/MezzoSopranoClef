name: CI

# Build + test on every push and pull request. workflow_dispatch lets the heavy
# e2e job be kicked off by hand from the Actions tab.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # `./gradlew build` compiles the mod + launcher, runs the JUnit suites, and
      # remaps the jar (Fabric/Loom) into build/libs.
      - name: Build (compile, JUnit tests, remap jar, launcher jar)
        run: ./gradlew build --stacktrace --no-daemon

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            build/libs/*.jar
            launcher/build/libs/*.jar

  # ---------------------------------------------------------------------------
  # Heavy end-to-end job: MANUAL ONLY (workflow_dispatch).
  #
  # Boots a real headless server + bot and asserts it joins the world and can take
  # a GPU-free screenshot. With no-GL mode this needs NO xvfb and NO software GL —
  # on a displayless runner the bot boots on the GLFW null platform. Marked
  # continue-on-error so a flaky/slow run never blocks CI.
  # ---------------------------------------------------------------------------
  e2e:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make scripts executable
        run: chmod +x ./gradlew ./scripts/*.sh

      # no-GL boot needs no virtual display: the bot runs windowless on the null platform.
      - name: Run e2e (headless, no GPU/display)
        run: ./scripts/e2e.sh
